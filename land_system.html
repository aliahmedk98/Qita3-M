<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="الأراضي"/>
<meta name="theme-color" content="#060d17"/>
<title>نظام بيع الأراضي</title>
<style>
/* خط النظام - يشتغل بدون انترنت على iOS و Safari */
</style>
<style>
:root{--bg:#060d17;--bg2:#0d1824;--bg3:#060d17;--border:#1a2e44;--border2:#1e293b;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--header-bg:rgba(6,13,23,.97);--inp-bg:#0a1628;--inp-text:#f1f5f9;--modal-bg:#0d1824;--export-bg:#060d17;--inst-border:#1a2e44;--shadow:0 2px 12px rgba(0,0,0,.3)}
body.light{--bg:#eef2f7;--bg2:#fff;--bg3:#f4f7fb;--border:#dde3ed;--border2:#c8d0dc;--text:#1a2332;--text2:#4a5568;--text3:#718096;--header-bg:rgba(255,255,255,.98);--inp-bg:#fff;--inp-text:#1a2332;--modal-bg:#fff;--export-bg:#eef2f7;--inst-border:#e8edf4;--shadow:0 2px 16px rgba(0,0,0,.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{-webkit-user-select:none;-webkit-touch-callout:none;-webkit-tap-highlight-color:transparent;background:var(--bg);color:var(--text);font-family:-apple-system,'SF Pro Arabic','Helvetica Neue',Arial,sans-serif;min-height:100vh;overscroll-behavior:none;font-size:16px;transition:background .25s,color .25s}
input,button,select,textarea{font-family:inherit}
button{cursor:pointer}
.safe-top{padding-top:max(60px,env(safe-area-inset-top)) !important}
.content{padding-bottom:max(24px,env(safe-area-inset-bottom)) !important}
.header{position:sticky;top:0;z-index:100;background:var(--header-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 20px 10px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;box-shadow:var(--shadow)}
.nav{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.nav-btn{padding:8px 16px;border-radius:9px;border:none;font-size:15px;font-weight:600;background:transparent;color:var(--text3);transition:all .2s}
.nav-btn.active{background:rgba(59,130,246,.12);color:#3b82f6}
.content{max-width:1100px;margin:0 auto;padding:24px 16px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:20px 22px;margin-bottom:14px;transition:all .25s;box-shadow:var(--shadow)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:22px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow)}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:13px}
.mini{background:var(--bg3);border-radius:10px;padding:12px 14px}
.inp{-webkit-user-select:text;user-select:text;width:100%;padding:12px 16px;border-radius:10px;border:1.5px solid var(--border2);background:var(--inp-bg);color:var(--inp-text);font-size:16px;outline:none;-webkit-appearance:none;}
.inp:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
textarea.inp{resize:vertical;min-height:70px}
.btn{padding:10px 20px;border-radius:10px;border:none;font-size:15px;font-weight:600;color:#fff}
.btn-blue{background:linear-gradient(135deg,#3b82f6,#1d4ed8)}
.btn-green{background:linear-gradient(135deg,#16a34a,#15803d)}
.btn-red{background:rgba(239,68,68,.1);color:#dc2626!important;border:1px solid rgba(239,68,68,.15)}
.btn-blue-o{background:rgba(59,130,246,.1);color:#2563eb!important;border:1px solid rgba(59,130,246,.15)}
.btn-green-o{background:rgba(22,163,74,.1);color:#15803d!important;border:1px solid rgba(22,163,74,.15)}
.btn-orange-o{background:rgba(251,146,60,.1);color:#ea580c!important;border:1px solid rgba(251,146,60,.15)}
.btn-ghost{background:transparent;border:1.5px solid var(--border2);color:var(--text2)!important}
.btn-sm{padding:6px 13px;font-size:13px;border-radius:7px}
.prog{height:6px;background:var(--border);border-radius:99px;overflow:hidden}
.prog-bar{height:100%;border-radius:99px;background:linear-gradient(90deg,#3b82f6,#6366f1)}
.prog-bar.done{background:linear-gradient(90deg,#16a34a,#15803d)}
.badge{border-radius:7px;padding:3px 10px;font-size:13px;font-weight:700}
.inst-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--inst-border);font-size:15px;gap:8px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;display:flex;align-items:center;justify-content:center;padding:14px;backdrop-filter:blur(8px)}
.modal{background:var(--modal-bg);border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.2)}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);padding:11px 28px;border-radius:12px;z-index:9999;font-size:15px;font-weight:700;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.toast.ok{background:rgba(22,163,74,.12);border:1px solid #16a34a;color:#15803d}
.toast.err{background:rgba(239,68,68,.12);border:1px solid #dc2626;color:#dc2626}
.form-group{margin-bottom:13px}
.form-label{font-size:14px;color:var(--text2);display:block;margin-bottom:5px;font-weight:500}
.hint-box{background:rgba(59,130,246,.06);border:1.5px solid rgba(59,130,246,.18);border-radius:10px;padding:12px 15px;color:#2563eb;font-size:15px;margin-bottom:12px}
.theme-btn{padding:7px 13px;border-radius:9px;border:1.5px solid var(--border);background:var(--bg2);color:var(--text);font-size:16px;cursor:pointer;box-shadow:var(--shadow)}
#receipt-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:800;display:flex;flex-direction:column;align-items:center;overflow-y:auto;padding:14px;backdrop-filter:blur(6px)}
#receipt-paper{background:#fff;color:#111;width:100%;max-width:420px;padding:24px 22px;border-radius:8px;font-size:13px;box-shadow:0 12px 40px rgba(0,0,0,.5)}
.r-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px dotted #ddd;font-size:14px}
#export-screen{position:fixed;inset:0;background:var(--export-bg);z-index:9000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
#app{min-height:100vh;background:var(--bg)}
/* ===== PLOT TABS ===== */
.plot-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.plot-tab{padding:7px 16px;border-radius:10px;border:1.5px solid var(--border);background:transparent;color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.plot-tab.active{background:rgba(59,130,246,.15);border-color:#3b82f6;color:#60a5fa}
/* ===== DELAY LIST ===== */
.delay-card{background:var(--bg2);border:1.5px solid rgba(248,113,113,.25);border-radius:14px;padding:16px 18px;margin-bottom:12px}
/* ===== DIARY DAYS ===== */
.days-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px}
.day-cell{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center;cursor:pointer;transition:all .2s}
.day-cell:hover{border-color:#3b82f6;background:rgba(59,130,246,.06)}
.day-cell.has-data{border-color:rgba(74,222,128,.3);background:rgba(74,222,128,.04)}
.day-cell.has-overdue{border-color:rgba(248,113,113,.3);background:rgba(248,113,113,.04)}
.months-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
/* ===== GRACE badge ===== */
.badge-grace{background:rgba(251,146,60,.12);color:#fb923c;border-radius:7px;padding:3px 10px;font-size:13px;font-weight:700}
@media(max-width:640px){
  .grid3{grid-template-columns:1fr}
  .inst-row{align-items:flex-start;flex-direction:column}
  .inst-row>div:last-child{width:100%;justify-content:space-between}
  .nav-btn{padding:8px 10px;font-size:13px}
  .card{padding:16px}
}
@media print{
  *{background:white!important;color:black!important;box-shadow:none!important}
  body>*{display:none!important}
  #receipt-overlay{display:block!important;position:static!important;background:white!important;padding:0!important;overflow:visible!important}
  #receipt-actions{display:none!important}
  #receipt-paper{display:block!important;box-shadow:none!important;max-width:100%!important;border-radius:0!important;padding:0!important;background:white!important;color:black!important}
  .r-row{font-size:10px!important;padding:2px 0!important}
  #receipt-paper *{page-break-inside:avoid!important}
  @page{size:A4 landscape;margin:6mm;orphans:0;widows:0}
  a[href]:after{content:none!important}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .url-cover{display:block!important;position:fixed!important;bottom:0!important;left:0!important;right:0!important;height:30px!important;background:white!important;z-index:99999!important}
}
</style>
</head>
<body>

<!-- شاشة التصدير الإجبارية -->

<div id="export-screen" style="display:none">
  <div style="font-size:64px;margin-bottom:16px">⚠️</div>
  <div style="font-size:22px;font-weight:700;color:var(--text);margin-bottom:8px">يجب تصدير البيانات</div>
  <div id="export-msg" style="font-size:14px;color:var(--text2);margin-bottom:6px;line-height:1.6"></div>
  <div style="font-size:12px;color:var(--text3);margin-bottom:28px">لا تقدر تكمل بدون تصدير</div>
  <button class="btn btn-green" onclick="doExport()" style="width:100%;max-width:300px;padding:16px;font-size:16px;border-radius:12px;margin-bottom:12px">📤 تصدير البيانات الآن</button>
  <div style="font-size:11px;color:var(--text3)">يحفظ ملف land-data.json على جهازك</div>
</div>

<!-- التطبيق الرئيسي -->

<div id="app" style="display:none">

    <div class="nav">
      <button class="nav-btn active" id="nav-dashboard" onclick="goPage('dashboard')">الرئيسية</button>
      <button class="nav-btn" id="nav-customers" onclick="goPage('customers')">الزبائن</button>
      <button class="nav-btn" id="nav-schedule" onclick="goPage('schedule')">الأقساط</button>
      <button class="nav-btn" id="nav-delays" onclick="goPage('delays')">⚠️ التأخير</button>
      <button class="nav-btn" id="nav-diary" onclick="goPage('diary')">📅 اليوميات</button>
      <div style="width:1px;height:16px;background:#1a2e44;margin:0 3px"></div>
      <button class="btn btn-green-o btn-sm" onclick="doExport()" id="export-btn">📤 تصدير <span id="export-timer" style="font-size:10px;opacity:.7"></span></button>
      <button class="btn btn-blue-o btn-sm" onclick="document.getElementById('imp').click()">📥 استيراد</button>
      <button class="theme-btn" onclick="toggleTheme()" id="theme-btn">☀️</button>
      <input id="imp" type="file" accept=".json" style="display:none" onchange="importData(event)"/>
    </div>
  </div>
  <div class="content" id="content"></div>
</div>

<!-- Toast -->

<div class="toast ok" id="toast" style="display:none"></div>

<!-- Modal عام -->

<div class="modal-bg" id="modal-bg" style="display:none" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div style="font-size:16px;font-weight:700;margin-bottom:16px" id="modal-title"></div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- Confirm Dialog -->

<div class="modal-bg" id="confirm-bg" style="display:none">
  <div style="background:var(--modal-bg);border:1px solid var(--border);border-radius:14px;padding:26px;max-width:290px;text-align:center">
    <div id="ci" style="font-size:34px;margin-bottom:8px"></div>
    <div id="ct" style="font-size:15px;font-weight:700;margin-bottom:6px"></div>
    <div id="cs" style="font-size:12px;color:var(--text2);margin-bottom:18px"></div>
    <div style="display:flex;gap:10px;justify-content:center">
      <button class="btn btn-ghost" onclick="closeConfirm()">إلغاء</button>
      <button class="btn" id="cok" style="background:linear-gradient(135deg,#dc2626,#991b1b)">تأكيد</button>
    </div>
  </div>
</div>

<!-- وصل الاستلام -->

<div id="receipt-overlay" style="display:none">
  <div id="receipt-actions" style="display:flex;gap:10px;margin-bottom:14px;padding-top:6px">
    <button class="btn btn-green" onclick="window.print()" style="padding:11px 28px;font-size:14px">🖨️ اطبع الوصل</button>
    <button class="btn" onclick="closeReceipt()" style="background:#111;border:1px solid #444;color:#aaa;padding:11px 18px">✕ إغلاق</button>
  </div>
  <div id="receipt-paper" dir="rtl"></div>
</div>

</body>
</html>
